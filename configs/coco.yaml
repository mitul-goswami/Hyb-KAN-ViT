model:
  detector: "MaskRCNN"
  backbone_type: "ViTDet"

dataset:
  name: "COCO2017"
  root: "/path/to/coco"
  train_ann: "annotations/instances_train2017.json"
  val_ann: "annotations/instances_val2017.json"
  batch_size: 16
  image_size: [800, 1333] 
  num_workers: 8

training:
  epochs: 36
  optimizer: "AdamW"
  lr: 0.0001
  weight_decay: 0.05
  grad_clip: 1.0
  fp16: True

  augmentation:
    horizontal_flip: True
    multi_scale: True
    scale_range: [0.8, 1.25]

evaluation:
  metrics:
    - "APb"
    - "AP50b"
    - "AP75b"
    - "APm"
    - "AP50m"
    - "AP75m"
